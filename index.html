<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Widget Test</title>
<style>
/* Chat bubble */
#chat-bubble {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background-color: #348637; /* Change to match site accent */
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    z-index: 9999;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}
#chat-bubble svg {
    width: 28px;
    height: 28px;
    fill: white;
}

/* Chat window */
#chat-window {
position: fixed;
bottom: 90px;
right: 20px;
width: 350px;
max-height: 500px;
background: white;
border-radius: 10px;
box-shadow: 0 8px 16px rgba(0,0,0,0.3);
display: none;
flex-direction: column;
overflow: hidden;
z-index: 9999;
font-family: Arial, sans-serif;
}

/* Header */
#chat-header {
background-color: #4CAF50;
color: white;
padding: 10px;
font-size: 16px;
font-weight: bold;
}

/* Messages container */
#chat-messages {
flex: 1;
padding: 10px;
overflow-y: auto;
font-size: 14px;
}

/* Input container */
#chat-input-container {
display: flex;
border-top: 1px solid #ddd;
}
#chat-input {
flex: 1;
padding: 10px;
border: none;
font-size: 14px;
}
#chat-send {
background-color: #4CAF50;
color: white;
border: none;
padding: 0 16px;
cursor: pointer;
}
#chat-send:hover {
background-color: #45a049;
}

/* Message bubbles */
.user-msg {
text-align: right;
margin-bottom: 8px;
}
.user-msg span {
display: inline-block;
background-color: #DCF8C6;
padding: 6px 10px;
border-radius: 10px;
}
.bot-msg {
text-align: left;
margin-bottom: 8px;
}
.bot-msg span {
display: inline-block;
background-color: #F1F0F0;
padding: 6px 10px;
border-radius: 10px;
} </style>

</head>
<body>

<!-- Chat bubble -->

<div id="chat-bubble" title="Chat with us">
    <!-- Simple chat icon -->
    <svg viewBox="0 0 24 24">
        <path d="M4 4h16v12H5.17L4 17.17V4z"></path>
    </svg>
</div>

<!-- Chat window -->

<div id="chat-window">
    <div id="chat-header">Chat with us</div>
    <div id="chat-messages"></div>
    <div id="chat-input-container">
        <input type="text" id="chat-input" placeholder="Type a message..." />
        <button id="chat-send">Send</button>
    </div>
</div>

<script>
const chatBubble = document.getElementById("chat-bubble");
const chatWindow = document.getElementById("chat-window");
const chatMessages = document.getElementById("chat-messages");
const chatInput = document.getElementById("chat-input");
const chatSend = document.getElementById("chat-send");

// Toggle chat window
chatBubble.addEventListener("click", () => {
    chatWindow.style.display = chatWindow.style.display === "flex" ? "none" : "flex";
    chatWindow.style.flexDirection = "column";
    chatInput.focus();
});

// Send message function
async function sendMessage() {
    const msg = chatInput.value.trim();
    if (!msg) return;

    // Display user message
    const userMsgDiv = document.createElement("div");
    userMsgDiv.className = "user-msg";
    userMsgDiv.innerHTML = `<span>${msg}</span>`;
    chatMessages.appendChild(userMsgDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    chatInput.value = "";

    // Send to backend
    try {
        const resp = await fetch("https://mt-chatbot.onrender.com", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ question: msg })
});

const data = await resp.json();


        const botMsgDiv = document.createElement("div");
        botMsgDiv.className = "bot-msg";
        botMsgDiv.innerHTML = `<span>${data.answer}</span>`;
        chatMessages.appendChild(botMsgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    } catch (err) {
        const botMsgDiv = document.createElement("div");
        botMsgDiv.className = "bot-msg";
        botMsgDiv.innerHTML = `<span>Error connecting to server.</span>`;
        chatMessages.appendChild(botMsgDiv);
    }
}

chatSend.addEventListener("click", sendMessage);
chatInput.addEventListener("keypress", e => {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
